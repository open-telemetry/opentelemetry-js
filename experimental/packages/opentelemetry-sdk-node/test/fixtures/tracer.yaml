file_format: "1.0-rc.3"
disabled: false
tracer_provider:
  processors:
    - batch:
        schedule_delay: 5000
        export_timeout: 30000
        max_queue_size: 2048
        max_export_batch_size: 512
        exporter:
          otlp_http:
            endpoint: http://localhost:4318/v1/traces
            tls:
              ca_file: /app/cert.pem
              key_file: /app/cert.pem
              cert_file: /app/cert.pem
            headers:
              - name: api-key
                value: "1234"
            headers_list: "api-key=1234"
            compression: gzip
            timeout: 10000
            encoding: protobuf
    - batch:
        schedule_delay: 5000
        export_timeout: 30000
        max_queue_size: 2048
        max_export_batch_size: 512
        exporter:
          otlp_http:
            endpoint: http://localhost:4318/v1/traces
            tls:
              ca_file: /app/cert.pem
              key_file: /app/cert.pem
              cert_file: /app/cert.pem
            headers:
              - name: api-key
                value: "1234"
            headers_list: "api-key=1234"
            compression: gzip
            timeout: 10000
            encoding: json
    - batch:
        schedule_delay: 5000
        export_timeout: 30000
        max_queue_size: 2048
        max_export_batch_size: 512
        exporter:
          otlp_http:
            endpoint: http://localhost:4318/v1/traces
            tls:
              ca_file: /app/cert.pem
              key_file: /app/cert.pem
              cert_file: /app/cert.pem
            headers:
              - name: api-key
                value: "1234"
            headers_list: "api-key=1234"
            compression: gzip
            timeout: 10000
            encoding: invalid
    - batch:
        exporter:
          otlp_grpc:
            endpoint: http://localhost:4317
            tls:
              ca_file: /app/cert.pem
              key_file: /app/cert.pem
              cert_file: /app/cert.pem
              insecure: false
            headers:
              - name: api-key
                value: "1234"
            headers_list: "api-key=1234"
            compression: gzip
            timeout: 10000
    - batch:
        exporter:
          otlp_file/development:
            output_stream: file:///var/log/traces.jsonl
    - batch:
        exporter:
          otlp_file/development:
            output_stream: stdout
    - simple:
        exporter:
          console:
  limits:
    attribute_value_length_limit: 4096
    attribute_count_limit: 128
    event_count_limit: 128
    link_count_limit: 128
    event_attribute_count_limit: 128
    link_attribute_count_limit: 128
  sampler:
    parent_based:
      root:
        always_on:
      remote_parent_sampled:
        always_on:
      remote_parent_not_sampled:
        probability/development:
          ratio: 0.01
      local_parent_sampled:
        composite/development:
          rule_based:
            rules:
              - attribute_values:
                  key: http.route
                  values:
                    - /healthz
                    - /livez
                sampler:
                  always_off:
              - attribute_patterns:
                  key: http.path
                  included:
                    - /internal/*
                  excluded:
                    - /internal/special/*
                sampler:
                  always_on:
              - parent:
                  - none
                span_kinds:
                  - client
                sampler:
                  probability:
                    ratio: 0.05
              - sampler:
                  probability:
                    ratio: 0.001
      local_parent_not_sampled:
        always_off:
