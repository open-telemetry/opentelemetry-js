name: Survey on Merged PR by Non-Member

on:
  # zizmor: ignore[dangerous-triggers] — this workflow only calls the reusable shared workflow; no PR code is checked out or executed.
  pull_request_target:
    types: [closed]
    branches: [main]

permissions: {}

jobs:
  survey:
    permissions:
      pull-requests: write # required by the shared workflow to post the survey comment
    uses: open-telemetry/shared-workflows/.github/workflows/survey-on-merged-pr.yml@c47c16a6c5aac4b549e700ad055d070f6ac0d8f9 # v0.2.0
