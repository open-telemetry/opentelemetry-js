name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  e2e-tests:
    strategy:
      fail-fast: false
      matrix:
        node_version:
          - "18.19.0"
          - "18"
          - "20.6.0"
          - "20"
          - "22.22.1" # pin to avoid bug in 22.22.2
          - "24"
          - "25"
          - "26"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # rolldown needs Node >=20.12, so build on 24; dist is target-agnostic.
      - name: Setup Node.js 24 (build)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
          node-version: 24

      - name: Bootstrap
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run compile

      - name: Setup Node.js (test)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node_version }}

      - name: Install collector
        run: |
          curl -sSL -o otelcol-contrib.tar.gz https://github.com/open-telemetry/opentelemetry-collector-releases/releases/download/v0.126.0/otelcol-contrib_0.126.0_linux_amd64.tar.gz
          tar -xzf otelcol-contrib.tar.gz
        working-directory: e2e-tests
      - name: run collector in background
        run: |
          ./otelcol-contrib --config collector-config.yaml &
        working-directory: e2e-tests
      - name: Export telemetry to collector
        run: npm run export-telemetry
        working-directory: e2e-tests
      - name: stop collector
        run: pkill -f otelcol-contrib
        working-directory: e2e-tests
      - name: Print output
        run: cat collector-output.json
        working-directory: e2e-tests
      - name: verify exported telemetry
        run: npm run verify
        working-directory: e2e-tests
