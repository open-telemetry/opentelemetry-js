name: Unit Tests
on:
  push:
    branches:
      - main
  pull_request:
  merge_group:

permissions:
  contents: read

jobs:
  node-tests:
    strategy:
      fail-fast: false
      matrix:
        node_version:
          - 18.19.0
          - 18
          - 20.6.0
          - 20
          - 22
          - 24
          - 26
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
          node-version: ^26.3.0

      - name: Bootstrap
        run: npm ci --ignore-scripts

      - name: Build 🔧
        run: npm run compile

      # The compile above ran on the repo's build Node (^26.3.0) because tsdown
      # does not support Node < 22.18. Tests, however, must cover every
      # supported runtime, so switch to the matrix Node version for them.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node_version }}

      - run: npm test

      - name: Report Coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6.0.2
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          verbose: true
  node-windows-tests:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
          node-version: ^26.3.0

      - name: Bootstrap
        run: npm ci --ignore-scripts

      - name: Build 🔧
        run: |
          npm config set script-shell "C:\\Program Files\\git\\bin\\bash.exe"
          npm run compile

      - name: Unit tests
        run: npm run test
  verify-pack:
    # Unit tests run against TS source via ts-node, so they never exercise
    # the published dist/ artifact. This job packs every workspace package,
    # loads the require/import targets of its `exports` map, and existence
    # checks types/browser/main/module files in the tarball.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
          node-version: ^26.3.0

      - name: Bootstrap
        run: npm ci --ignore-scripts

      - name: Build 🔧
        run: npm run compile

      - name: Verify packed artifacts
        run: npm run verify-pack

  browser-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
          node-version: ^26.3.0

      - name: Bootstrap
        run: npm ci --ignore-scripts

      - name: Build 🔧
        run: npm run compile

      - name: Unit tests
        run: npm run test:browser
      - name: Report Coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6.0.2
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          verbose: true
  webworker-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
          node-version: ^26.3.0

      - name: Bootstrap
        run: npm ci --ignore-scripts

      - name: Build 🔧
        run: npm run compile

      - name: Unit tests
        run: npm run test:webworker
      - name: Report Coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6.0.2
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          verbose: true
