name: W3C Trace Context Integration Test

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
          node-version: 22

      - name: Install and Bootstrap 🔧
        run: npm ci --ignore-scripts

      - name: Generate version.ts files
        run: npm run version:update

      # propagation-validation-server is plain JS post-tsdown migration; no
      # compile step needed.

      - name: Run W3C Test harness
        run: ./integration-tests/tracecontext-integration-test.sh
