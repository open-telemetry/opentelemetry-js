file_format: "1.1"

disabled: ${OTEL_SDK_DISABLED:-false}
log_level: info

resource:
  attributes:
    - name: service.name
      value: declarative-config-example
    - name: service.version
      value: "0.1.0"
    - name: deployment.environment.name
      value: ${DEPLOYMENT_ENV:-development}

# Configure the W3C propagators explicitly. tracecontext and baggage match the
# spec default, but the propagator block must be present for any to be applied.
propagator:
  composite:
    - tracecontext:
    - baggage:

tracer_provider:
  processors:
    - batch:
        exporter:
          otlp_http:
            endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://localhost:4318}/v1/traces
            # Headers support env var substitution so secrets don't live in the YAML.
            headers:
              - name: x-example-api-key
                value: ${EXAMPLE_API_KEY:-}
            compression: gzip
            timeout: 10000
  sampler:
    parent_based:
      root:
        trace_id_ratio_based:
          ratio: 1.0

meter_provider:
  readers:
    - periodic:
        interval: 10000
        timeout: 5000
        exporter:
          otlp_http:
            endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://localhost:4318}/v1/metrics
            compression: gzip
            timeout: 10000

logger_provider:
  processors:
    - batch:
        exporter:
          otlp_http:
            endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://localhost:4318}/v1/logs
            compression: gzip
            timeout: 10000
